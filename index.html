<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Prompt Builder Ultimate v4.8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    textarea { font-family: ui-monospace, monospace; }
    .toast { opacity: 0; transition: opacity 2s ease-out; pointer-events: none; }
    .toast.show { opacity: 1; transition: none; }
    .glow-checkbox { accent-color: #f59e0b; width: 1.1rem; height: 1.1rem; cursor: pointer; }
    /* Styl dla checkboxów efektów */
    .effect-check { accent-color: #2563eb; width: 1rem; height: 1rem; cursor: pointer; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 py-4 sm:py-8 relative">
<div class="max-w-6xl mx-auto px-4 sm:px-6">
  <div class="grid md:grid-cols-2 gap-6 sm:gap-8">
    
    <div class="bg-white rounded-3xl border shadow-sm p-5 sm:p-8 space-y-8 relative">
      
      <button onclick="resetToDefaults()" class="absolute top-5 right-5 sm:top-8 sm:right-8 text-xs bg-gray-200 hover:bg-gray-300 text-gray-600 px-3 py-1.5 rounded-lg transition-colors font-semibold z-10 shadow-sm">
        Default
      </button>

      <div>
        <h1 class="text-2xl sm:text-3xl font-bold text-center text-gray-800 mt-8 sm:mt-0">RPG Prompt Builder v4.8</h1>
        
        <div class="flex flex-wrap items-center justify-center gap-2 mt-4 bg-gray-100 p-2 rounded-2xl w-max mx-auto border border-gray-200 max-w-full">
          <button onclick="openSaveModal()" class="p-2 bg-white rounded-xl shadow-sm hover:bg-blue-50 text-blue-600 transition-colors" title="Zapisz aktualny preset">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
          </button>
          <div class="w-px h-6 bg-gray-300 mx-1"></div>
          <div class="p-1 text-gray-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></div>
          <button onclick="loadPreset(1)" class="w-8 h-8 rounded-full bg-white shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold text-sm transition-colors text-gray-600">1</button>
          <button onclick="loadPreset(2)" class="w-8 h-8 rounded-full bg-white shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold text-sm transition-colors text-gray-600">2</button>
          <button onclick="loadPreset(3)" class="w-8 h-8 rounded-full bg-white shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold text-sm transition-colors text-gray-600">3</button>
          <button onclick="loadPreset(4)" class="w-8 h-8 rounded-full bg-white shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold text-sm transition-colors text-gray-600">4</button>
          <button onclick="loadPreset(5)" class="w-8 h-8 rounded-full bg-white shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold text-sm transition-colors text-gray-600">5</button>
        </div>
      </div>
      
      <div>
        <div class="flex justify-between items-end mb-2">
          <label class="font-semibold text-gray-700">Scena</label>
          <button onclick="translateText('scene')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">PL ➜ EN</button>
        </div>
        <textarea id="scene" class="w-full h-28 rounded-2xl border border-gray-300 p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-y">The character stands proudly in the forest. Gazing into space with hands on hips. In the background is the mountains skyline, clouds, and blue sky.</textarea>
      </div>

      <div class="bg-gray-50 p-5 rounded-3xl border border-gray-200 space-y-6">
        <h3 class="font-bold text-gray-800 border-b pb-2">Ustawienia Wizualne</h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-bold mb-1 text-gray-500 uppercase">Ujęcie</label>
            <select id="shot" class="w-full rounded-xl border border-gray-300 p-2 text-sm focus:ring-2 focus:ring-blue-500">
              <option value="none">brak</option>
              <option value="portrait">portret</option>
              <option value="bust">popiersie</option>
              <option value="fullBody" selected>pełna sylwetka</option>
              <option value="high-angle">high-angle</option>
              <option value="low-angle">low-angle</option>
              <option value="worm-eye">worm's-eye</option>
              <option value="dramatic-wide">dramatic-wide</option>
              <option value="dramatic-extreme">dramatic-extreme</option>
              <option value="close-up">close-up</option>
              <option value="extreme-close-up">extreme close-up</option>
              <option value="aerial">aerial</option>
              <option value="close-up-portrait">close-up portrait</option>
              <option value="macro">macro</option>
              <option value="wide-angle">wide-angle</option>
              <option value="establishing">establishing</option>
              <option value="over-the-shoulder">over-the-shoulder</option>
              <option value="telephoto">telephoto</option>
              <option value="handheld">handheld</option>
              <option value="panoramic">panoramic</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-bold mb-1 text-gray-500 uppercase">Styl</label>
            <select id="style" class="w-full rounded-xl border border-gray-300 p-2 text-sm focus:ring-2 focus:ring-blue-500">
              <option value="none">brak</option>
              <option value="hyperrealism" selected>hyperrealism</option>
              <option value="painterlySprite">painterly</option>
              <option value="pixelArtGame">pixel game</option>
              <option value="pixelIllustration">pixel illustration</option>
              <option value="illustration">ilustracja</option>
              <option value="watercolor">watercolor</option>
              <option value="waifu">waifu</option>
              <option value="pixar">pixar</option>
              <option value="anime">anime</option>
              <option value="cartoon2d">2d cartoon</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-bold mb-1 text-gray-500 uppercase">Kolor</label>
            <select id="color" class="w-full rounded-xl border border-gray-300 p-2 text-sm focus:ring-2 focus:ring-blue-500">
              <option value="none" selected>brak</option>
              <option value="neon">neon</option>
              <option value="cool-toned-sterile">cool-toned sterile</option>
              <option value="vibrant">vibrant</option>
              <option value="warm">warm</option>
              <option value="cool-toned">cool-toned</option>
              <option value="pastel">pastel</option>
              <option value="duotone">duotone</option>
              <option value="monochrome">monochrome</option>
              <option value="bright">bright</option>
              <option value="muted">muted</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold mb-3 text-gray-500 uppercase">Efekty (zaznacz wiele)</label>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-white p-4 rounded-2xl border border-gray-200">
            <label class="flex items-center gap-2 text-xs cursor-pointer hover:text-blue-600">
              <input type="checkbox" value="none" id="effect-none" class="effect-check" onchange="clearEffects(this)"> <span class="font-bold">brak</span>
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="tilt-shift" class="effect-item effect-check"> tilt-shift
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="golden-hour" class="effect-item effect-check"> golden hour
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="bokeh" class="effect-item effect-check"> bokeh
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="soft-focus" class="effect-item effect-check"> soft focus
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="dof" class="effect-item effect-check"> depth of field
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="chromatic" class="effect-item effect-check"> chromatic abb.
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="light-leaks" class="effect-item effect-check"> light leaks
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="rear-projection" class="effect-item effect-check"> rear projection
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="lens-flare" class="effect-item effect-check"> lens flare
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="long-exposure" class="effect-item effect-check"> long exposure
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" value="silhouette" class="effect-item effect-check"> silhouette
            </label>
          </div>
        </div>
      </div>

      <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 space-y-4">
        <div>
          <label class="block font-semibold mb-2">Nagość / Ubiór</label>
          <select id="nudity" class="w-full rounded-2xl border border-gray-300 p-3 text-sm">
            <option value="none">brak</option>
            <option value="dressed" selected>ubrany (dressed)</option>
            <option value="nude">nude</option>
            <option value="nudeFlower">nude + flower</option>
            <option value="topless">topless</option>
          </select>
        </div>
        <div id="intimateHairContainer" class="hidden">
          <label class="block font-semibold mb-2 text-gray-700">Owłosienie intymne</label>
          <select id="intimateHair" class="w-full rounded-2xl border border-gray-300 p-3 text-sm">
            <option value="none">brak</option>
            <option value="shaved" selected>gładkie (shaved)</option>
            <option value="hair">naturalne owłosienie</option>
          </select>
        </div>
        <div id="outfitContainer">
          <label class="block font-semibold mb-2 text-gray-700">Opis stroju</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <input id="outfit" type="text" value="wearing a full armour" class="flex-1 w-full rounded-2xl border border-gray-300 p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="translateText('outfit')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-3 sm:py-2 rounded-2xl text-xs font-bold transition-colors shrink-0 w-full sm:w-auto">PL ➜ EN</button>
          </div>
        </div>
      </div>

      <div class="border-t pt-4">
        <h3 class="font-bold text-lg mb-4 text-blue-600">Podstawy Postaci</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block font-semibold mb-2">Płeć</label>
            <select id="gender" class="w-full rounded-2xl border border-gray-300 p-3 text-sm" onchange="toggleGenderUI()">
              <option value="none">brak</option>
              <option value="female" selected>kobieta</option>
              <option value="male">mężczyzna</option>
            </select>
          </div>
          <div>
            <label class="block font-semibold mb-2">Wiek</label>
            <select id="age" class="w-full rounded-2xl border border-gray-300 p-3 text-sm">
              <option value="none">brak</option>
              <option value="child">dziecko</option>
              <option value="young adult">młody dorosły</option>
              <option value="adult" selected>dorosły</option>
              <option value="old">stary</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block font-semibold mb-2 text-gray-700">Kolor skóry</label>
            <select id="skinTone" class="w-full rounded-2xl border border-gray-300 p-3 text-sm">
              <option value="none">brak</option>
              <option value="fair" selected>fair</option>
              <option value="medium">medium</option>
              <option value="olive">olive</option>
              <option value="deep">deep</option>
              <option value="brown">brown</option>
              <option value="black">black</option>
              <option value="pale">pale</option>
              <option value="green cool">green cool</option>
              <option value="green warm">green warm</option>
              <option value="blue">blue</option>
              <option value="red">red</option>
            </select>
          </div>
          <div>
            <label class="block font-semibold mb-2 text-gray-700">Opalenizna</label>
            <select id="tan" class="w-full rounded-2xl border border-gray-300 p-3 text-sm">
              <option value="none" selected>brak</option>
              <option value="light tan">light tan</option>
              <option value="summer tan">summer tan</option>
              <option value="deep tan">deep tan</option>
            </select>
          </div>
        </div>
      </div>

      <div id="facialHairSection" class="border-t pt-4 hidden">
        <h3 class="font-bold text-lg mb-4 text-blue-600">Zarost</h3>
        <div class="grid grid-cols-3 gap-3">
          <div><label class="block text-xs font-semibold mb-1">Zarost</label>
            <select id="stubble" class="w-full rounded-xl border border-gray-300 p-2 text-xs"><option value="none" selected>brak</option><option value="one-day stubble">jednodniowy</option><option value="multi-day stubble">kilkudniowy</option></select></div>
          <div><label class="block text-xs font-semibold mb-1">Broda</label>
            <select id="beard" class="w-full rounded-xl border border-gray-300 p-2 text-xs"><option value="none" selected>brak</option><option value="short beard">krótka</option><option value="long beard">długa</option></select></div>
          <div><label class="block text-xs font-semibold mb-1">Wąsy</label>
            <select id="moustache" class="w-full rounded-xl border border-gray-300 p-2 text-xs"><option value="none" selected>brak</option><option value="short moustache">krótkie</option><option value="handlebar moustache curled upwards">zawijane</option></select></div>
        </div>
      </div>

      <div class="border-t pt-4">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg text-blue-600">Głowa i Twarz</h3>
          <label class="flex items-center gap-2 text-xs font-medium text-amber-700 cursor-pointer bg-amber-50 px-3 py-1.5 rounded-full border border-amber-200 hover:bg-amber-100">
            <input type="checkbox" id="glowingEyes" class="glow-checkbox"> glowing eyes
          </label>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div><label class="block font-semibold mb-2 text-gray-700">Uszy</label>
            <select id="ears" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="human" selected>ludzkie</option><option value="elven">elfie</option><option value="goblin">goblińskie</option></select></div>
          <div><label class="block font-semibold mb-2 text-gray-700">Kolor oczu</label>
            <select id="eyeColor" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="blue" selected>niebieskie</option><option value="green">zielone</option><option value="amber">bursztynowe</option></select></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div><label class="block font-semibold mb-2 text-gray-700">Emocje</label>
            <select id="emotion" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="neutral" selected>neutralność</option><option value="smile">uśmiech</option><option value="shyness">nieśmiałość</option></select></div>
          <div><label class="block font-semibold mb-2 text-gray-700">Zęby</label>
            <select id="teeth" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="normal teeth" selected>normalne</option><option value="small sharp fangs">kły</option></select></div>
        </div>
      </div>

      <div class="border-t pt-4">
        <h3 class="font-bold text-lg mb-4 text-blue-600">Fryzura i Włosy</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div><label class="block font-semibold mb-2 text-gray-700">Kolor</label>
            <select id="hairColor" class="w-full rounded-xl border border-gray-300 p-2 text-sm"><option value="none">brak</option><option value="black" selected>czarne</option><option value="blonde">blond</option><option value="brown">brązowe</option></select></div>
          <div><label class="block font-semibold mb-2 text-gray-700">Długość</label>
            <select id="hairLength" class="w-full rounded-xl border border-gray-300 p-2 text-sm" onchange="toggleCustomLength()"><option value="none">brak</option><option value="medium" selected>średnie</option><option value="custom">własny</option></select></div>
        </div>
        <div id="customLengthContainer" class="hidden mb-4">
          <label class="block font-semibold mb-2 text-gray-700">Własny opis długości</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <input id="hairLengthCustomDesc" type="text" class="flex-1 w-full rounded-2xl border border-gray-300 p-3 text-sm">
            <button onclick="translateText('hairLengthCustomDesc')" class="bg-blue-100 px-4 py-2 rounded-2xl text-xs font-bold transition-colors">PL ➜ EN</button>
          </div>
        </div>
      </div>

      <div class="border-t pt-4">
        <h3 class="font-bold text-lg mb-4 text-blue-600">Ciało i Proporcje</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div><label class="block font-semibold mb-2 text-gray-700">Wzrost</label>
            <select id="height" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="normal" selected>normalny</option><option value="tall">wysoki</option></select></div>
          <div><label class="block font-semibold mb-2 text-gray-700">Głowa</label>
            <select id="headSize" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="normal" selected>normalna</option></select></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block font-semibold mb-2 text-gray-700">Typ ciała</label>
            <select id="body" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="none">brak</option><option value="normal" selected>normalne</option><option value="muscular">umięśnione</option></select></div>
          <div id="chestContainer"><label class="block font-semibold mb-2 text-gray-700">Piersi</label>
            <select id="chest" class="w-full rounded-2xl border border-gray-300 p-3 text-sm"><option value="medium breasts" selected>średnia</option><option value="large breasts">duża</option></select></div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl border shadow-sm p-5 sm:p-8 flex flex-col h-full sticky top-8 max-h-[90vh]">
      <h2 class="text-xl sm:text-2xl font-semibold mb-4 text-gray-800">Wygenerowany Prompt</h2>
      <textarea id="promptOutput" readonly class="flex-1 w-full min-h-[250px] rounded-2xl border border-gray-300 p-4 sm:p-6 text-sm resize-y font-mono leading-relaxed"></textarea>
      <button onclick="copyPrompt()" class="mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-lg">
        Kopiuj Prompt do Schowka
      </button>
    </div>
  </div>
</div>

<div id="saveModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center">
    <h3 class="text-xl font-bold mb-4">Zapisz preset</h3>
    <div class="flex justify-center gap-3 mb-6">
      <button onclick="savePreset(1)" class="w-12 h-12 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white font-bold transition-colors">1</button>
      <button onclick="savePreset(2)" class="w-12 h-12 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white font-bold transition-colors">2</button>
      <button onclick="savePreset(3)" class="w-12 h-12 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white font-bold transition-colors">3</button>
      <button onclick="savePreset(4)" class="w-12 h-12 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white font-bold transition-colors">4</button>
      <button onclick="savePreset(5)" class="w-12 h-12 rounded-full bg-blue-100 hover:bg-blue-600 hover:text-white font-bold transition-colors">5</button>
    </div>
    <button onclick="closeSaveModal()" class="w-full py-2 text-gray-500 font-semibold">Anuluj</button>
  </div>
</div>

<div id="dynamicToast" class="toast fixed bottom-8 right-8 bg-gray-800 text-white px-6 py-4 rounded-2xl shadow-2xl z-50 flex items-center gap-3"></div>

<script>
const hyperTagBlock = `(sharp focus, smooth, aesthetic, extremely detailed, octane render, solo, cinematic light, intricate detail, highly detailed, high res, detailed facial features, Ultrarealistic Photography, Masterpiece, Ultra-Realistic Model, Realistic Skin Texture, Realistic, Hyper Realism, 8K Photography, Studio Photography.)`;

const styles = {
  hyperrealism: { full: "Create a highly photorealistic image captured with a modern full-frame mirrorless camera..." },
  painterlySprite: { full: "a stylized fantasy illustration with visible brush texture." },
  pixelArtGame: { full: "a crisp pixel art game scene with 8-bit aesthetic." },
  pixelIllustration: { full: "ultra-high resolution pixel art illustration." },
  illustration: { full: "a high-quality masterpiece illustration." },
  watercolor: { full: "a beautiful watercolor painting." },
  waifu: { full: "a semi-realistic anime waifu illustration." },
  pixar: { full: "a detailed 3D Pixar-style render." },
  anime: { full: "clean high-quality anime art." },
  cartoon2d: { full: "a clean 2D cartoon illustration." }
};

const shots = {
  portrait: "portrait shot", bust: "medium bust shot", fullBody: "wide cinematic full shot",
  "high-angle": "high-angle shot", "low-angle": "low-angle shot",
  "worm-eye": "Extreme worm’s-eye view from very low ground level looking upward",
  "dramatic-wide": "dramatic wide-lens perspective",
  "dramatic-extreme": "dramatic angle, extreme angle shot",
  "close-up": "close-up shot", "extreme-close-up": "extreme close-up",
  "aerial": "aerial shot", "close-up-portrait": "close-up portrait",
  "macro": "macro shot", "wide-angle": "wide-angle shot",
  "establishing": "establishing shot", "over-the-shoulder": "over-the-shoulder shot",
  "telephoto": "telephoto shot", "handheld": "handheld shot", "panoramic": "panoramic shot"
};

const effectsMap = {
  "tilt-shift": "tilt-shift effect", "golden-hour": "golden hour", "bokeh": "bokeh",
  "soft-focus": "soft focus", "dof": "shallow depth of field", "chromatic": "chromatic aberrations",
  "light-leaks": "light leaks", "rear-projection": "rear projection", "lens-flare": "lens flare",
  "long-exposure": "long exposure", "silhouette": "silhouette"
};

const colorsMap = {
  "neon": "neon color grading", "cool-toned-sterile": "cool-toned sterile colors",
  "vibrant": "vibrant color grading", "warm": "warm color grading",
  "cool-toned": "cool-toned color grading", "pastel": "pastel color grading",
  "duotone": "duotone color grading", "monochrome": "monochrome",
  "bright": "bright color grading", "muted": "muted color grading"
};

const inputIds = ['scene', 'nudity', 'intimateHair', 'outfit', 'shot', 'style', 'color', 'gender', 'age', 'skinTone', 'tan', 'stubble', 'beard', 'moustache', 'ears', 'eyeColor', 'emotion', 'teeth', 'eyebrows', 'freckles', 'hairColor', 'hairLength', 'hairLengthCustomDesc', 'hairType', 'hairStyle', 'height', 'headSize', 'body', 'chest', 'tail', 'feet'];

function getValue(id) { return document.getElementById(id).value; }

function clearEffects(noneCheckbox) {
  if (noneCheckbox.checked) {
    document.querySelectorAll('.effect-item').forEach(cb => cb.checked = false);
  }
  generatePrompt();
}

function toggleGenderUI() {
  const gender = getValue('gender');
  document.getElementById('facialHairSection').classList.toggle('hidden', gender !== 'male');
  document.getElementById('chestContainer').classList.toggle('hidden', gender === 'male');
  generatePrompt();
}

function toggleCustomLength() {
  document.getElementById('customLengthContainer').classList.toggle('hidden', getValue('hairLength') !== 'custom');
  generatePrompt();
}

function showToast(message, isSuccess = true) {
  const t = document.getElementById('dynamicToast');
  t.innerHTML = message;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, 2000);
}

function openSaveModal() { document.getElementById('saveModal').classList.remove('hidden'); }
function closeSaveModal() { document.getElementById('saveModal').classList.add('hidden'); }

function savePreset(slot) {
  const state = {};
  inputIds.forEach(id => { state[id] = getValue(id); });
  state.glowingEyes = document.getElementById('glowingEyes').checked;
  const selectedEff = [];
  document.querySelectorAll('.effect-item:checked').forEach(cb => selectedEff.push(cb.value));
  state.effects = selectedEff;
  
  localStorage.setItem('rpg_preset_' + slot, JSON.stringify(state));
  closeSaveModal();
  showToast(`Zapisano preset w slocie ${slot}`);
}

function loadPreset(slot) {
  const data = localStorage.getItem('rpg_preset_' + slot);
  if(data) {
    const state = JSON.parse(data);
    inputIds.forEach(id => { if(state[id] !== undefined) document.getElementById(id).value = state[id]; });
    document.getElementById('glowingEyes').checked = state.glowingEyes || false;
    
    document.querySelectorAll('.effect-item').forEach(cb => {
      cb.checked = state.effects ? state.effects.includes(cb.value) : false;
    });
    
    toggleGenderUI(); toggleCustomLength(); generatePrompt();
    showToast(`Wczytano preset ${slot}`);
  }
}

async function translateText(inputId) {
  const inputEl = document.getElementById(inputId);
  const text = inputEl.value.trim();
  if (!text) return;
  try {
    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=pl|en`);
    const data = await response.json();
    if (data.responseData.translatedText) {
      inputEl.value = data.responseData.translatedText;
      generatePrompt();
    }
  } catch (e) { showToast("Błąd tłumaczenia", false); }
}

function generatePrompt() {
  const styleKey = getValue('style');
  const shotKey = getValue('shot');
  const colorKey = getValue('color');
  const gender = getValue('gender');
  const subj = (gender === 'female' || gender === 'none') ? 'She' : 'He';
  const objPos = (gender === 'female' || gender === 'none') ? 'Her' : 'His';

  // Budowa sekcji wizualnej zaraz po Scenie
  let p = `Setting: ${getValue('scene')}\n`;
  
  const selectedEffects = [];
  document.querySelectorAll('.effect-item:checked').forEach(cb => selectedEffects.push(effectsMap[cb.value]));
  if (selectedEffects.length > 0) {
    p += `effect: ${selectedEffects.join(', ')}\n`;
  }
  
  if (colorKey !== 'none') {
    p += `color: ${colorsMap[colorKey]}\n`;
  }
  
  p += `\n`;

  if(styleKey === 'hyperrealism') p += `${hyperTagBlock}\n\n`;
  if(shotKey !== 'none') p += `Camera: ${shots[shotKey]}\n\n`;
  if(styleKey !== 'none' && styleKey !== 'hyperrealism') p += `${styles[styleKey].full}\n\n`;

  let face = `The character is ${getValue('age')} ${gender !== 'none' ? gender : 'character'}. `;
  if(getValue('emotion') !== 'none') face += `${subj} is displaying a ${getValue('emotion')} expression. `;
  if(getValue('skinTone') !== 'none') face += `${subj} has ${getValue('skinTone')} skin. `;
  if(document.getElementById('glowingEyes').checked) face += `Glowing ${getValue('eyeColor')} eyes. `;
  
  let hairStr = "";
  if(getValue('hairLength') !== 'none') hairStr = `${objPos} hair is ${getValue('hairColor')} and ${getValue('hairLength') === 'custom' ? document.getElementById('hairLengthCustomDesc').value : getValue('hairLength')}. `;

  let bodyStr = `Body: ${getValue('height')} height, ${getValue('body')} type. `;
  if(gender === 'female') bodyStr += `${getValue('chest')}. `;

  let cloth = getValue('nudity') === 'dressed' ? `${subj} is ${getValue('outfit')}.` : `${subj} is ${getValue('nudity')}.`;

  document.getElementById('promptOutput').value = p + face + "\n\n" + hairStr + "\n\n" + bodyStr + "\n\n" + cloth;
}

function copyPrompt() {
  const output = document.getElementById('promptOutput');
  output.select();
  document.execCommand('copy');
  showToast('Skopiowano!');
}

function resetToDefaults() {
  location.reload();
}

window.onload = () => {
  document.querySelectorAll('select, textarea, input').forEach(el => {
    el.addEventListener('change', () => {
      if (el.classList.contains('effect-item')) {
        document.getElementById('effect-none').checked = false;
      }
      generatePrompt();
    });
  });
  generatePrompt();
};
</script>
</body>
</html>
